<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Homepage</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('images/Bg2.jpg');
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6);
        }
        .logo img {
            height: 70px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #ffcc00;
        }



        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 80px);
            padding: 20px;
        }
        .content {
            background: rgba(80, 82, 82, 0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 420px;
        }
        .description {
            flex: 1;
            margin-right: 20px;
            color: white;
        }
        .chatbot-button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .chatbot-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/Sahaay logo.jpg" alt="Logo">
        </div>
        <nav>
            <a href="https://cfi.iitm.ac.in/clubs/team-sahaay" target="_blank">About Sahaay</a>
            <a href="chatbot.html" target="_blank">NeuraSkin Bot</a>
            
        </nav>
    </header>
    <main>
        <div class="content">
            <div class="description">
                <h2 style="text-align:center; color:rgb(203, 224, 242)">Welcome to Our Homepage</h2>
                <p style="text-align:center; color:rgb(203, 224, 242)">
                    Upload your skin condition image, and let our AI-powered chatbot instantly diagnose potential skin diseases with accuracy. Get quick and reliable insights to take the next step in your skincare journey!
                </p>
            </div>
            <a href="chatbot.html" class="chatbot-button" target="_blank">Open Chatbot</a>
        </div>
    </main>

    <script>
        window.onload = function() {
            document.body.style.opacity = 1; 
        }
      </script>
</body>
</html>
